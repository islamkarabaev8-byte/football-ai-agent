name: Daily Football Report

on:
  # Запуск точно в 22:00 по Алматы выполняет внешний сервис cron-job.org,
  # который дёргает этот workflow_dispatch через GitHub API.
  # (Родное расписание GitHub `schedule` ненадёжно — пропускает запуски.)
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Send football report
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python send_report.py
