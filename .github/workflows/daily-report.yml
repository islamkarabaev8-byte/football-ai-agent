name: Daily Football Report

on:
  schedule:
    # 17:07 UTC = 22:07 по Алматы (UTC+5).
    # Минута :07 вместо :00 — на GitHub верхушка часа самая загруженная,
    # из-за чего запуски ровно в :00 чаще пропускаются/задерживаются.
    - cron: "7 17 * * *"
  workflow_dispatch:  # кнопка ручного запуска в GitHub

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Send football report
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python send_report.py
